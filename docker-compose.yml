services:
  # 全流水线 (ETL → Feature → Backtest)
  pipeline:
    build: .
    volumes:
      - ./data:/app/data          # 数据冷热分离 (铁律七)
      - ./models:/app/models
      - ./logs:/app/logs
    command: python pipeline.py

  # FastAPI 后端服务
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
