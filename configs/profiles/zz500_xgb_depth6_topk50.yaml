# ============================================================
# 实验 Profile: 中证500 + XGBoost 深树 + 控换手
# 只需写要覆盖 base_config.yaml 的项，其余自动继承
# ============================================================

model:
  active: "xgboost"
  xgboost:
    n_estimators: 200
    learning_rate: 0.03
    max_depth: 6
    subsample: 0.7
    colsample_bytree: 0.7

backtest:
  top_k: 50
  max_turnover: 0.4
